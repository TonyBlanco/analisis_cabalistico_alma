name: Validate Kabbalah mappings

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-mappings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run mapping validation
        run: |
          python backend/scripts/validate_mappings.py
