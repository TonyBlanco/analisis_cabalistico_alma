# Studios33 — API (Django / Gunicorn)
# Copiar a: /opt/voxtvserver/nginx/conf.d/api.studios33.app.conf

upstream studio33_api {
    server studio33_api:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.studios33.app;

    ssl_certificate     /etc/nginx/certs/studios33-origin.crt;
    ssl_certificate_key /etc/nginx/certs/studios33-origin.key;

    client_max_body_size 20m;

    # Sustituye el CSP global de voxtv_nginx (http {}) — el de VoxTV rompe Django admin.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.studios33.app https://studios33.app; frame-ancestors 'none'; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_hide_header  Content-Security-Policy;
        proxy_pass         http://studio33_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_buffering          off;
        proxy_request_buffering  off;
    }
}