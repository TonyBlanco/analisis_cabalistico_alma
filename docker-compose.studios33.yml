# Studios33 en Hetzner — red Docker compartida solo con Nginx/Postgres de VoxTV.
# cd /opt/studio33 && docker compose -f docker-compose.studios33.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    container_name: studio33_ollama
    restart: unless-stopped
    volumes:
      - studio33_ollama:/root/.ollama
    networks:
      - voxtv_net
    expose:
      - "11434"

  studio33_api:
    build:
      context: .
      dockerfile: deploy/studios33/Dockerfile.api
    container_name: studio33_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/astrology/ephemeris:/app/astrology/ephemeris:ro
      - studio33_media:/app/media
      - studio33_static:/app/staticfiles
    networks:
      - voxtv_net
    expose:
      - "8000"

  studio33_web:
    build:
      context: .
      dockerfile: deploy/studios33/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.studios33.app/api}
    container_name: studio33_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    networks:
      - voxtv_net
    expose:
      - "3000"

volumes:
  studio33_media:
  studio33_static:
  studio33_ollama:

networks:
  voxtv_net:
    external: true
    name: voxtvserver_voxtv_net
