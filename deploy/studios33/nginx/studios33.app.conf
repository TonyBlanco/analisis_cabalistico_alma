# Studios33 — frontend (Next.js)
# Copiar a: /opt/voxtvserver/nginx/conf.d/studios33.app.conf

upstream studio33_web {
    server studio33_web:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name studios33.app www.studios33.app;

    ssl_certificate     /etc/nginx/certs/studios33-origin.crt;
    ssl_certificate_key /etc/nginx/certs/studios33-origin.key;

    # Sin CSP aquí: Next.js middleware ya envía CSP (evita doble política con VoxTV).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass         http://studio33_web;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}